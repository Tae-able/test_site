<!doctype html>
<html lang="ko">
 <head>
  <meta charset = utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
  <!-- 깃헙 페이지는 기본적으로 index.html 파일을 첫 화면으로 인식. -->
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; line-height: 1.6; color: #333; }

        /* 헤더 디자인 */
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 0;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* 메인 컨텐츠 */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .hero {
            background: #f4f4f4;
            padding: 3rem;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
        }

        /* 푸터 */
        footer {
            text-align: center;
            padding: 2rem 0;
            background: #f4f4f4;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
  <title>My GitHub Page</title>
    <header>
        <h1>My Website</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h2>반가워! 내 홈페이지에 온 걸 환영해.</h2>
            <p>HTML과 CSS만으로 깔끔한 레이아웃을 만들 수 있어.</p>
            <button class="btn" onclick="sayHello()">버튼 클릭해보기</button>
        </section>

        <section id="content">
            <h3>주요 특징</h3>
            <ul>
                <li><strong>반응형:</strong> 모바일에서도 잘 보여.</li>
                <li><strong>깔끔함:</strong> 군더더기 없는 디자인이야.</li>
                <li><strong>커스터마이징:</strong> 색상이나 글꼴을 자유롭게 바꿔봐.</li>
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>

    <script>
        function sayHello() {
            alert('반가워! 버튼이 잘 작동하고 있어.');
        }
    </script>

</body>
</html>
